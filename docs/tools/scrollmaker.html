<!DOCTYPE html>
<html>
<head>
    <title>Scroll Maker</title>

    <!-- Quill editor imports -->
    <link href="css/quill.snow.css" rel="stylesheet" />
    <script src="js/highlight.min.js"></script>
    <script src="js/quill.js"></script>
    <link href="css/atom-one-dark.min.css" rel="stylesheet" />
    <script src="js/katex.min.js"></script>
    <link href="css/katex.min.css" rel="stylesheet" />
    <link href="css/quill.css" rel="stylesheet" />

    <!-- HTML to Image import -->
    <script src="js/html-to-image.min.js"></script>

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="css/google-fonts.css" rel="stylesheet">
    
    <!-- Beer CSS -->
    <link href="css/beer.min.css" rel="stylesheet">
    <script src="js/beer.min.js" type="module"></script>
    <script src="js/material-dynamic-colors.min.js" type="module"></script>

    <!-- My code -->
    <script type="text/javascript" src="js/mkcanvas.js"></script>
</head>
<body onload="buildThumbnails()">
    <div class="grid">
        <div class="s6">
            <div class="s6" style="height:85%;">
                <h4 class="s12">Scroll Maker</h4>
                <div class="s12">
                    <div id="toolbar"></div>
                    <div id="editor"></div>
                </div>
                <div class="s12 grid">
                    <div class="s4 field label border fill">
                        <input type="number" id="height" value="700" onchange="buildCanvas()" />
                        <label>Scroll Height</label>
                    </div>
                    <div class="s4 field label border fill">
                        <input type="number" id="width" value="500" onchange="buildCanvas()" />
                        <label>Scroll Width</label>
                    </div>

                <div class="s4">
                    <button onclick="exportImage()" >Save</button>
                </div>
                </div>
            </div>
        </div>
        <div class="s1 grid">
            <image class="s12 border square round extra" src="images/scroll1.png" style="height: 110px; width: 110px;" onclick="changeImage('images/scroll1.png', 0.160, 0.170, 0.650)" />
            <image class="s12 border square round extra" src="images/scroll2.jpg" style="height: 110px; width: 110px;" onclick="changeImage('images/scroll2.jpg', 0.160, 0.150, 0.700)" />
            <image class="s12 border square round extra" src="images/scroll3.jpg" style="height: 110px; width: 110px;" onclick="changeImage('images/scroll3.jpg', 0.170, 0.200, 0.620)" />
            <image class="s12 border square round extra" src="images/scroll4.jpg" style="height: 110px; width: 110px;" onclick="changeImage('images/scroll4.jpg', 0.170, 0.200, 0.610)" />
            <image class="s12 border square round extra" src="images/scroll5.jpg" style="height: 110px; width: 110px;" onclick="changeImage('images/scroll5.jpg', 0.170, 0.140, 0.740)" />
            <image class="s12 border square round extra" src="images/scroll6.jpg" style="height: 110px; width: 110px;" onclick="changeImage('images/scroll6.jpg', 0.200, 0.200, 0.650)" />
            <image class="s12 border square round extra" src="images/scroll7.jpg" style="height: 110px; width: 110px;" onclick="changeImage('images/scroll7.jpg', 0.140, 0.200, 0.620)" />
        </div>
        <div class="s5 sandbox">
            <h4>Preview</h4>
            <div id="imagebox">
                <div id="sandbox" class="sandbox"></div>
            </div>
        </div>
    </div>
</body>
</html>
